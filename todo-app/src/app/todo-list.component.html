<div class="max-w-lg mx-auto p-4 bg-gray-100 shadow-lg rounded-lg">
    <h2 class="text-2xl font-bold text-center mb-4">ToDo Liste</h2>
    <div class="flex">
      <input [(ngModel)]="newTodoText"
             class="flex-grow border p-2 rounded-l"
             placeholder="Neues ToDo" />
      <button (click)="addTodo()" 
              class="bg-blue-500 text-white px-4 py-2 rounded-r">
        ➕
      </button>
    </div>
    
    <ul class="mt-4">
      <li *ngFor="let todo of todos" 
          class="flex justify-between items-center p-2 bg-white shadow mb-2 rounded">
        <span [class.line-through]="todo.completed">{{ todo.text }}</span>
        <div>
          <input type="checkbox" [(ngModel)]="todo.completed" class="mr-2" (change)="toggleComplete(todo)" />
          <button (click)="deleteTodo(todo.id)" class="text-red-500">🗑</button>
        </div>
      </li>
    </ul>
  </div>
